name: Release Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (required for manual run)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          # Use input tag if provided (manual run), else from push
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            RAW="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RAW="${GITHUB_REF#refs/tags/}"
          else
            echo "Error: No tag provided and not a tag push"
            exit 1
          fi
          # Strip leading 'v' once, centrally
          VERSION="${RAW#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Verify version in main file
        run: |
          PLUGIN_VERSION=$(grep "Version:" floorball-api-for-swiss-unihockey.php | awk '{print $NF}')
          TAG_VERSION="${{ steps.get_version.outputs.VERSION }}"

          if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Plugin version ($PLUGIN_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PLUGIN_VERSION"

      - name: Generate readme.txt
        run: php scripts/convert_readme.php

      - name: Create ZIP archive
        run: |
          mkdir floorball-api-for-swiss-unihockey
          rsync -av --progress . floorball-api-for-swiss-unihockey \
            --exclude floorball-api-for-swiss-unihockey \
            --exclude .git \
            --exclude .github \
            --exclude .gitignore \
            --exclude .gitattributes \
            --exclude .distignore \
            --exclude docker-compose.yml \
            --exclude Dockerfile \
            --exclude scripts \
            --exclude verify_api.php \
            --exclude README.md
          zip -r floorball-api-for-swiss-unihockey.zip floorball-api-for-swiss-unihockey
          rm -rf floorball-api-for-swiss-unihockey

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          files: floorball-api-for-swiss-unihockey.zip
          generate_release_notes: true

  deploy-wporg:
    name: Deploy to WordPress.org
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate readme.txt
        run: php scripts/convert_readme.php

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: floorball-api-for-swiss-unihockey
          VERSION: ${{ needs.build.outputs.version }}